@if(course) {
<div class="max-w-2xl mx-auto mt-10 p-8 bg-red rounded-2xl shadow-xl border border-slate-100">
    <div class="relative">
        <img [src]="course.image" class="w-full h-64 object-cover rounded-xl mb-6 shadow-sm">
        <span class="absolute top-4 right-4 bg-indigo-600 text-white px-4 py-1 rounded-full font-bold">
            {{course.catId | titlecase}}
        </span>
    </div>

    <h2 class="text-4xl font-black text-slate-900 mb-2">{{course.title}}</h2>
    <p class="text-lg text-slate-500 mb-6">Led by <span class="text-indigo-600 font-bold">{{course.instructor}}</span>
    </p>

    <div class="grid grid-cols-2 gap-6 p-6 bg-slate-50 rounded-xl mb-8">
        <div>
            <p class="text-xs uppercase tracking-widest text-slate-400 font-bold">Investment</p>
            <p class="text-2xl font-black text-emerald-600">${{course.price}}</p>
        </div>
        <div>
            <p class="text-xs uppercase tracking-widest text-slate-400 font-bold">Availability</p>
            <p class="text-2xl font-black text-slate-700">{{course.seats}} Seats left</p>
        </div>
    </div>

    <div class="flex gap-4">
        <button
            class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">
            Enroll Now
        </button>
        <button routerLink="/courses"
            class="px-8 py-4 border-2 border-slate-200 text-slate-500 font-bold rounded-xl hover:bg-slate-50 transition-all">
            Back to Catalog
        </button>
    </div>
</div>
} @else {
<div class="flex justify-center items-center h-64">
    <p class="text-slate-400 animate-pulse font-bold">Loading course details...</p>
</div>
}
