<div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
    <h2 class="text-3xl font-bold text-indigo-700 mb-6">{{ isEditMode ? 'Edit' : 'Add' }} Course</h2>
    <form (ngSubmit)="onSubmit()" #form="ngForm" class="flex flex-col gap-4">
        <div>
            <label class="block text-slate-700 font-bold mb-1">Title</label>
            <input type="text" name="title" [(ngModel)]="course.title" required
                class="w-full border-2 border-slate-200 rounded-lg p-2 focus:border-indigo-600 outline-none">
        </div>
        <div>
            <label class="block text-slate-700 font-bold mb-1">Instructor</label>
            <input type="text" name="instructor" [(ngModel)]="course.instructor" required
                class="w-full border-2 border-slate-200 rounded-lg p-2 focus:border-indigo-600 outline-none">
        </div>
        <div class="flex gap-4">
            <div class="flex-1">
                <label class="block text-slate-700 font-bold mb-1">Price ($)</label>
                <input type="number" name="price" [(ngModel)]="course.price" required
                    class="w-full border-2 border-slate-200 rounded-lg p-2 focus:border-indigo-600 outline-none">
            </div>
            <div class="flex-1">
                <label class="block text-slate-700 font-bold mb-1">Seats</label>
                <input type="number" name="seats" [(ngModel)]="course.seats" required
                    class="w-full border-2 border-slate-200 rounded-lg p-2 focus:border-indigo-600 outline-none">
            </div>
        </div>
        <div>
            <label class="block text-slate-700 font-bold mb-1">Image URL</label>
            <input type="text" name="image" [(ngModel)]="course.image" required
                class="w-full border-2 border-slate-200 rounded-lg p-2 focus:border-indigo-600 outline-none">
        </div>
        <div>
            <label class="block text-slate-700 font-bold mb-1">Category</label>
            <select name="catId" [(ngModel)]="course.catId" required
                class="w-full border-2 border-slate-200 rounded-lg p-2 focus:border-indigo-600 outline-none">
                <option value="" disabled>Select a category</option>
                @for(cat of categories; track cat.id) {
                <option [value]="cat.id">{{ cat.name | titlecase }}</option>
                }
            </select>
        </div>
        <div class="flex justify-end gap-3 mt-4">
            <button type="button" routerLink="/courses"
                class="px-4 py-2 font-bold text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>
            <button type="submit" [disabled]="!form.valid"
                class="bg-indigo-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-indigo-700 transition disabled:bg-slate-400">
                {{ isEditMode ? 'Update' : 'Add' }}
            </button>
        </div>
    </form>
</div>
